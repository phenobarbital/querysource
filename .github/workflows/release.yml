name: Python package build and publish

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Add Rust to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel maturin twine cython

      - name: Build wheels
        env:
          CIBW_ARCHS: x86_64
          # Install Rust and build qs_parsers Rust sub-package inside the manylinux container
          CIBW_BEFORE_BUILD: >-
            curl https://sh.rustup.rs -sSf | sh -s -- -y &&
            export PATH=/root/.cargo/bin:$PATH &&
            pip install maturin &&
            cd rust && maturin build --release && pip install target/wheels/*.whl && cd ..
          # Make sure Rust tools are on the PATH for the Cython build
          CIBW_ENVIRONMENT: "PATH=/root/.cargo/bin:$PATH"
          RUST_SUBPACKAGE_PATH: rust
          CIBW_BUILD: "cp3{10,11,12,13}-*"
        run: |
          cibuildwheel --platform linux --output-dir dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-py${{ matrix.python-version }}
          path: dist/*.whl

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/querysource
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          path: dist-artifacts

      - name: Move wheel files to dist directory
        run: |
          mkdir -p dist
          find dist-artifacts -name '*.whl' -exec mv {} dist/ \;

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist

      - name: Check for wheel types
        id: check_wheels
        run: |
          echo "Checking for wheel types..."
          if ls dist/*-manylinux*.whl 1> /dev/null 2>&1; then
            echo "Found manylinux wheels."
            echo "HAS_MANYLINUX_WHEELS=true" >> $GITHUB_ENV
          fi
          if ls dist/*-win_*.whl 1> /dev/null 2>&1; then
            echo "Found Windows wheels."
            echo "HAS_WINDOWS_WHEELS=true" >> $GITHUB_ENV
          fi

      - name: List files in dist
        run: ls -l dist

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Publish wheels and sdist to PyPI
        run: |
          uv tool install twine
          uv tool run twine upload dist/*.whl dist/*.tar.gz --username __token__ --password ${{ secrets.QUERYSOURCE_API_TOKEN }}
