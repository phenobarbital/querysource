name: Python package build and publish

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - python-version: "3.10"
            cibw-build: "cp310-*"
          - python-version: "3.11"
            cibw-build: "cp311-*"
          - python-version: "3.12"
            cibw-build: "cp312-*"
          - python-version: "3.13"
            cibw-build: "cp313-*"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel maturin twine cython

      - name: Build wheels
        env:
          CIBW_ARCHS: x86_64
          # Install Rust, build _qs_parsers (without manylinux repair — cibuildwheel's
          # auditwheel handles that for the final querysource wheel), then extract the
          # .so directly from the maturin wheel into the querysource package tree.
          CIBW_BEFORE_BUILD: >-
            curl https://sh.rustup.rs -sSf | sh -s -- -y &&
            export PATH=/root/.cargo/bin:$PATH &&
            pip install maturin &&
            cd {project}/rust && rm -rf target/wheels &&
            maturin build --release --manylinux off --interpreter python3 &&
            python3 -c "
            import zipfile, glob, os, shutil;
            whl = glob.glob('target/wheels/*.whl')[0];
            zf = zipfile.ZipFile(whl);
            so = [n for n in zf.namelist() if n.endswith('.so') and '_qs_parsers' in n][0];
            zf.extract(so, '/tmp/_qs');
            shutil.copy2(os.path.join('/tmp/_qs', so), '{project}/querysource/qs_parsers/');
            " &&
            cd {project}
          CIBW_ENVIRONMENT: "PATH=/root/.cargo/bin:$PATH"
          CIBW_BUILD: ${{ matrix.cibw-build }}
        run: |
          cibuildwheel --platform linux --output-dir dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-py${{ matrix.python-version }}
          path: dist/*.whl

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/querysource
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          pattern: wheels-py*
          path: dist-artifacts
          merge-multiple: true

      - name: Move wheel files to dist directory
        run: |
          mkdir -p dist
          find dist-artifacts -name '*.whl' -exec mv {} dist/ \;

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist

      - name: Check for wheel types
        id: check_wheels
        run: |
          echo "Checking for wheel types..."
          if ls dist/*-manylinux*.whl 1> /dev/null 2>&1; then
            echo "Found manylinux wheels."
            echo "HAS_MANYLINUX_WHEELS=true" >> $GITHUB_ENV
          fi
          if ls dist/*-win_*.whl 1> /dev/null 2>&1; then
            echo "Found Windows wheels."
            echo "HAS_WINDOWS_WHEELS=true" >> $GITHUB_ENV
          fi

      - name: List files in dist
        run: ls -l dist

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Publish wheels and sdist to PyPI
        run: |
          uv tool install twine
          uv tool run twine upload dist/*.whl dist/*.tar.gz --username __token__ --password ${{ secrets.QUERYSOURCE_API_TOKEN }}
